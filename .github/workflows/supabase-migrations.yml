name: Deploy Supabase Migrations
# Triggered to apply pending migrations and deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**/*.sql'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Push migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt
      
      - name: Set Edge Function secrets
        run: |
          supabase secrets set PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }} SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Verify deployment
        run: echo "Migrations and Edge Functions deployed successfully"
